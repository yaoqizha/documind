<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocuMind — 企業文件智能問答</title>
<style>
  :root {
    --bg: #ffffff; --surface: #f7f9fc; --surface-2: #eef1f6;
    --border: #dadce0; --text: #1f1f1f; --muted: #5f6368;
    --accent: #0b57d0; --accent-hover: #1a73e8; --accent-soft: #d3e3fd;
    --user-bubble: #d3e3fd; --bot-bubble: #f0f4f9;
    --ok: #1e8e3e; --warn: #b06000;
    --shadow-1: 0 1px 2px rgba(60,64,67,.12), 0 1px 3px rgba(60,64,67,.08);
    --shadow-2: 0 1px 3px rgba(60,64,67,.16), 0 4px 8px rgba(60,64,67,.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    font-family: "Google Sans Text", Roboto, -apple-system, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased;
  }
  /* Header */
  header {
    padding: 0 24px; height: 64px; background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  header .logo { font-size: 20px; font-weight: 600; color: var(--text); letter-spacing: .2px; display: flex; align-items: center; gap: 8px; }
  header .tag { font-size: 13px; color: var(--muted); }
  header .spacer { flex: 1; }
  header .badge { font-size: 12px; background: var(--surface-2); color: var(--muted); padding: 5px 12px; border-radius: 999px; font-weight: 500; }
  .wrap { flex: 1; display: flex; min-height: 0; }
  /* Sidebar */
  aside {
    width: 304px; background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px; gap: 20px; overflow-y: auto;
  }
  .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin-bottom: 10px; }
  label { font-size: 12.5px; color: var(--muted); display: block; margin-bottom: 6px; line-height: 1.45; }
  select, .composer input, input[type=text] {
    width: 100%; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit; outline: none; transition: .15s;
  }
  select:focus, input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .upload-box {
    border: 1.5px dashed var(--border); border-radius: 12px; padding: 18px; text-align: center;
    cursor: pointer; transition: .15s; font-size: 13px; color: var(--muted); background: var(--bg);
  }
  .upload-box:hover { border-color: var(--accent); color: var(--accent); background: #f6f9fe; }
  .btn {
    background: var(--accent); color: #fff; border: none; padding: 10px 16px; border-radius: 999px;
    cursor: pointer; font-size: 14px; font-weight: 500; transition: .15s; box-shadow: var(--shadow-1);
  }
  .btn:hover { background: var(--accent-hover); box-shadow: var(--shadow-2); }
  .btn:disabled { background: var(--surface-2); color: var(--muted); box-shadow: none; cursor: not-allowed; }
  .doc-list { display: flex; flex-direction: column; gap: 8px; }
  .doc-item { background: var(--bg); border-radius: 12px; padding: 10px 12px; font-size: 13px; box-shadow: var(--shadow-1); }
  .doc-item .fn { font-weight: 500; word-break: break-all; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
  .doc-item .meta { color: var(--muted); font-size: 11px; margin-top: 3px; }
  .badge-shared { font-size: 10px; background: var(--accent-soft); color: var(--accent); padding: 1px 7px; border-radius: 999px; white-space: nowrap; font-weight: 500; }
  .hint { font-size: 11.5px; color: var(--muted); line-height: 1.6; }
  .hint a { color: var(--accent); text-decoration: none; }
  /* Chat */
  main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg); }
  #messages { flex: 1; overflow-y: auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 22px; width: 100%; max-width: 840px; margin: 0 auto; }
  .msg { display: flex; gap: 12px; max-width: 100%; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; max-width: 80%; }
  .avatar { width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .avatar.bot { background: var(--accent); }
  .avatar.me { background: var(--accent-soft); }
  .bubble { background: var(--bot-bubble); border-radius: 18px 18px 18px 4px; padding: 13px 16px; font-size: 14.5px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .msg.user .bubble { background: var(--user-bubble); border-radius: 18px 18px 4px 18px; }
  .status { font-size: 12px; color: var(--muted); display: flex; gap: 6px; align-items: center; margin-bottom: 8px; }
  .pill { background: var(--surface-2); color: var(--muted); border-radius: 999px; padding: 3px 11px; font-size: 11px; font-weight: 500; transition: .2s; }
  .pill.active { background: var(--accent-soft); color: var(--accent); }
  .pill.done { background: #e6f4ea; color: var(--ok); }
  .sources { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .src { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 12.5px; }
  .src .head { display: flex; justify-content: space-between; align-items: center; color: var(--text); font-weight: 500; margin-bottom: 4px; gap: 8px; }
  .src .score { color: var(--accent); font-weight: 500; font-size: 11.5px; background: var(--accent-soft); padding: 1px 8px; border-radius: 999px; white-space: nowrap; }
  .src .ex { color: var(--muted); line-height: 1.55; max-height: 58px; overflow: hidden; }
  .clarify { background: #fef7e0; border: 1px solid #fde293; color: #875600; border-radius: 18px 18px 18px 4px; padding: 13px 16px; font-size: 14.5px; line-height: 1.6; }
  /* Composer */
  .composer { padding: 8px 24px 22px; background: var(--bg); }
  .composer-inner { max-width: 840px; margin: 0 auto; display: flex; align-items: center; gap: 8px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 28px; padding: 5px 5px 5px 20px; box-shadow: var(--shadow-1); transition: .15s; }
  .composer-inner:focus-within { border-color: var(--accent); box-shadow: 0 1px 6px rgba(11,87,208,.25); }
  .composer input { border: none; box-shadow: none; padding: 11px 0; background: transparent; }
  .composer input:focus { border: none; box-shadow: none; }
  .send-btn { width: 42px; height: 42px; min-width: 42px; border-radius: 50%; background: var(--accent); color: #fff;
    border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: .15s; }
  .send-btn:hover { background: var(--accent-hover); }
  .send-btn:disabled { background: var(--surface-2); color: var(--muted); cursor: not-allowed; }
  /* Empty state */
  .empty { text-align: center; color: var(--muted); margin: auto; max-width: 520px; }
  .empty h2 { color: var(--text); font-weight: 500; font-size: 26px; margin-bottom: 8px; }
  .empty p { font-size: 14px; }
  .empty .ex-q { display: inline-block; margin: 5px; padding: 9px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 999px; cursor: pointer; font-size: 13.5px; color: var(--text); transition: .15s; box-shadow: var(--shadow-1); }
  .empty .ex-q:hover { border-color: var(--accent); color: var(--accent); background: #f6f9fe; }
  /* Snackbar */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #323232; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 13.5px; opacity: 0; transition: .25s; pointer-events: none; box-shadow: var(--shadow-2); }
  .toast.show { opacity: 1; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #c6cacf; border-radius: 999px; border: 2px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: #adb2b8; background-clip: content-box; }
</style>
</head>
<body>
<header>
  <span class="logo">📑 DocuMind</span>
  <span class="tag">企業內部文件智能問答 · RAG + Reranker + Agent</span>
  <span class="spacer"></span>
  <span class="badge" id="health">● 連線中…</span>
</header>

<div class="wrap">
  <aside>
    <div>
      <div class="section-title">部門</div>
      <select id="tenant">
        <option value="hr_dept">人資部</option>
        <option value="it_dept">資訊部</option>
        <option value="finance_dept">財務部</option>
        <option value="_shared">🌐 全公司共用</option>
      </select>
    </div>

    <div>
      <div class="section-title">上傳文件</div>
      <input type="file" id="file" accept=".pdf,.md,.txt" style="display:none">
      <div class="upload-box" id="uploadBox">
        點此選擇檔案<br><span style="font-size:11px">支援 PDF / MD / TXT，上限 20MB</span>
      </div>
      <div id="fileName" class="hint" style="margin-top:8px"></div>
      <button class="btn" id="uploadBtn" style="width:100%;margin-top:10px" disabled>上傳並建立索引</button>
    </div>

    <div>
      <div class="section-title">已索引文件</div>
      <div class="doc-list" id="docList"><div class="hint">尚無文件</div></div>
    </div>

    <div style="margin-top:auto">
      <div class="hint">
        FastAPI · LangGraph Agent · pgvector(HNSW) · CrossEncoder Reranker · Gemini<br>
        <a href="/docs" target="_blank">API 文件 (/docs)</a>
      </div>
    </div>
  </aside>

  <main>
    <div id="messages">
      <div class="empty" id="empty">
        <h2>問我關於公司文件的任何問題</h2>
        <p>先在左側上傳文件，或直接試試以下問題：</p>
        <div>
          <span class="ex-q">員工到職滿兩年有幾天特別休假？</span>
          <span class="ex-q">遠距工作每週最多幾天？</span>
          <span class="ex-q">業務交際費每人每次上限多少？</span>
        </div>
      </div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <input type="text" id="q" placeholder="輸入問題，按 Enter 送出…" autocomplete="off">
        <button class="send-btn" id="send" title="送出">↑</button>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const tenantEl = $('#tenant'), msgs = $('#messages'), qEl = $('#q');
let busy = false;

function toast(t){ const e=$('#toast'); e.textContent=t; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),2200); }

// ── Health ──
fetch('/health').then(r=>r.json()).then(d=>{
  const ok = d.status==='ok';
  $('#health').textContent = '● ' + (ok?'服務正常':'資料庫異常');
  $('#health').style.color = ok ? '#1e8e3e' : '#d93025';
}).catch(()=>{ $('#health').textContent='● 無法連線'; $('#health').style.color='#d93025'; });

// ── Document list ──
async function loadDocs(){
  const t = tenantEl.value.trim(); if(!t) return;
  try{
    const r = await fetch('/api/v1/documents?tenant_id='+encodeURIComponent(t));
    const docs = await r.json();
    const el = $('#docList');
    if(!docs.length){ el.innerHTML='<div class="hint">此部門尚無文件</div>'; return; }
    el.innerHTML = docs.map(d=>`<div class="doc-item"><div class="fn">${esc(d.filename)}${d.is_shared?' <span class="badge-shared">🌐 共用</span>':''}</div><div class="meta">${d.chunk_count} chunks</div></div>`).join('');
  }catch(e){ /* ignore */ }
}
tenantEl.addEventListener('change', loadDocs);
loadDocs();

// ── Upload ──
const fileEl = $('#file');
$('#uploadBox').onclick = ()=> fileEl.click();
fileEl.onchange = ()=>{
  if(fileEl.files.length){ $('#fileName').textContent='已選：'+fileEl.files[0].name; $('#uploadBtn').disabled=false; }
};
$('#uploadBtn').onclick = async ()=>{
  if(!fileEl.files.length) return;
  const t = tenantEl.value.trim(); if(!t){ toast('請先選部門'); return; }
  const fd = new FormData(); fd.append('file', fileEl.files[0]); fd.append('tenant_id', t);
  $('#uploadBtn').disabled=true; $('#uploadBtn').textContent='上傳中…';
  try{
    const r = await fetch('/api/v1/documents', {method:'POST', body:fd});
    const d = await r.json();
    if(r.ok){ toast(`已索引 ${d.chunk_count} 個片段`); $('#fileName').textContent=''; fileEl.value=''; loadDocs(); }
    else throw new Error(d.detail||'上傳失敗');
  }catch(e){ toast('錯誤：'+e.message); }
  $('#uploadBtn').textContent='上傳並建立索引'; $('#uploadBtn').disabled=true;
};

// ── Chat ──
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function addUser(text){
  $('#empty')?.remove();
  const d = document.createElement('div'); d.className='msg user';
  d.innerHTML = `<div class="avatar me">🙋</div><div class="bubble">${esc(text)}</div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
}
function addBot(){
  const d = document.createElement('div'); d.className='msg';
  d.innerHTML = `<div class="avatar bot">🤖</div><div style="flex:1;min-width:0">
    <div class="status" data-status><span class="pill" data-n="classifier">分類</span><span class="pill" data-n="retriever">檢索</span><span class="pill" data-n="generator">生成</span></div>
    <div class="bubble" data-bubble></div><div class="sources" data-sources></div></div>`;
  msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  return d;
}

document.querySelectorAll('.ex-q').forEach(b=> b.onclick=()=>{ qEl.value=b.textContent; ask(); });
$('#send').onclick = ask;
qEl.addEventListener('keydown', e=>{ if(e.key==='Enter') ask(); });

async function ask(){
  if(busy) return;
  const query = qEl.value.trim(); if(!query) return;
  const tenant_id = tenantEl.value.trim(); if(!tenant_id){ toast('請先選部門'); return; }
  busy=true; qEl.value=''; $('#send').disabled=true;
  addUser(query);
  const bot = addBot();
  const bubble = bot.querySelector('[data-bubble]');
  const srcEl = bot.querySelector('[data-sources]');
  const statusEl = bot.querySelector('[data-status]');
  const setNode = n => { const p = statusEl.querySelector(`[data-n="${n}"]`); if(p) p.classList.add('active'); };
  const doneNode = () => statusEl.querySelectorAll('.pill.active').forEach(p=>{p.classList.remove('active');p.classList.add('done');});

  try{
    const res = await fetch('/api/v1/chat/stream', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({query, tenant_id})
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder(); let buf='';
    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      const parts = buf.split('\n\n'); buf = parts.pop();
      for(const p of parts){
        const line = p.trim(); if(!line.startsWith('data:')) continue;
        let ev; try{ ev = JSON.parse(line.slice(5).trim()); }catch(_){ continue; }
        if(ev.type==='node_start'){ setNode(ev.node); }
        else if(ev.type==='answer_chunk'){ doneNode(); bubble.textContent += ev.content; }
        else if(ev.type==='sources'){
          srcEl.innerHTML = (ev.sources||[]).map(s=>`<div class="src"><div class="head"><span>📄 ${esc(s.filename)}</span><span class="score">相關度 ${s.relevance_score}</span></div><div class="ex">${esc((s.excerpt||'').slice(0,120))}…</div></div>`).join('');
        }
        else if(ev.type==='clarification'){ doneNode(); bubble.outerHTML = `<div class="clarify">🤔 ${esc(ev.question)}</div>`; }
        else if(ev.type==='error'){ doneNode(); bubble.textContent = '⚠️ 發生錯誤：'+ev.message; }
        msgs.scrollTop = msgs.scrollHeight;
      }
    }
    doneNode();
  }catch(e){ bubble.textContent = '⚠️ 連線錯誤：'+e.message; }
  busy=false; $('#send').disabled=false; qEl.focus();
}
</script>
</body>
</html>
